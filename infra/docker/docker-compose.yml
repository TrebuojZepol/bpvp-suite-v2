# Local development stack. Copy `.env.example` to `.env` — required variables use `${VAR:?}` and fail fast if unset.
# Bitcoin RPC is NOT published to the host; PostgreSQL and Redis bind to 127.0.0.1 on the host for local tooling only.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: bpvp_suite
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d bpvp_suite",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "127.0.0.1:6379:6379"
    command:
      - sh
      - -c
      - exec redis-server --requirepass "$${REDIS_PASSWORD}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Signet bitcoind. RPC is not published to the host.
  # Entrypoint forwards flags to `bitcoind` — do not prefix the command with `bitcoind`.
  # Default signet RPC port is 38332; this stack uses 39332 (`-rpcport`). RPC listens inside the container for peers on the Docker network; `rpcallowip` restricts callers.
  bitcoin-core:
    image: ruimarinho/bitcoin-core:latest
    restart: unless-stopped
    environment:
      BITCOIN_RPC_USER: ${BITCOIN_RPC_USER:?BITCOIN_RPC_USER is required}
      BITCOIN_RPC_PASSWORD: ${BITCOIN_RPC_PASSWORD:?BITCOIN_RPC_PASSWORD is required}
    volumes:
      - bitcoind_data:/home/bitcoin/.bitcoin
    # Do NOT add ports: for RPC — keeps RPC off the host network namespace.
    command:
      - -printtoconsole
      - -signet
      - -server=1
      - -txindex=1
      - -rpcuser=${BITCOIN_RPC_USER:?BITCOIN_RPC_USER is required}
      - -rpcpassword=${BITCOIN_RPC_PASSWORD:?BITCOIN_RPC_PASSWORD is required}
      - -rpcport=39332
      - -rpcbind=0.0.0.0:39332
      - -rpcallowip=172.16.0.0/12
      - -rpcallowip=127.0.0.1/32
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bitcoin-cli -signet -rpcconnect=127.0.0.1 -rpcport=39332 -rpcuser="$$BITCOIN_RPC_USER" -rpcpassword="$$BITCOIN_RPC_PASSWORD" getblockchaininfo >/dev/null',
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:4222:4222"
    command:
      - "-js"
      - "-m"
      - "8222"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://127.0.0.1:8222/healthz | grep -q ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  bitcoind_data:
